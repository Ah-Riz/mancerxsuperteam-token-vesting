name: Web CI

on:
  push:
    branches-ignore: [main, test]
  pull_request:
    branches: [main, test]

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merkle-parity:
    name: Merkle parity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run merkle parity test
        run: pnpm tsx scripts/test-merkle-parity.ts

  e2e-pipeline:
    name: E2E Merkle pipeline
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci"
      ADMIN_API_KEY: "ci-test-key"
      NEXT_PUBLIC_RPC_ENDPOINT: "https://api.devnet.solana.com"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Push DB schema
        run: cd apps/web && echo "y" | pnpm drizzle-kit push

      - name: Start Next.js dev server
        run: cd apps/web && pnpm dev &

      - name: Wait for dev server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/campaigns > /dev/null 2>&1; then
              echo "Dev server is ready"
              exit 0
            fi
            echo "Waiting for dev server... ($i/30)"
            sleep 2
          done
          echo "ERROR: dev server did not start in time"
          exit 1

      - name: Run E2E merkle pipeline test
        run: pnpm tsx scripts/test-be-merkle-pipeline.ts --timeout 120000

  web-build-test:
    name: Web build & test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      NEXT_PUBLIC_RPC_ENDPOINT: "https://api.devnet.solana.com"
      ADMIN_API_KEY: "ci-test-key"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Vitest
        run: cd apps/web && pnpm test

      - name: Next.js build
        run: cd apps/web && pnpm build
